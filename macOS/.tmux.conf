# =============================================================================
#  Zaid's tmux config
# =============================================================================
# Prefix is C-a. Reload with <prefix> r. Plugins auto-install on first launch.

# --- General -----------------------------------------------------------------
# Truecolor (RGB). Requires a terminal that supports it (Warp/iTerm/Ghostty do).
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"

set -g default-shell /bin/zsh
set -g mouse on                       # click/scroll/resize with the mouse
set -sg escape-time 10                # snappy Esc (no lag in nvim)
set -g focus-events on                # let nvim know when its pane gains focus
set -g history-limit 50000
set -g set-clipboard on               # native OS clipboard (no reattach hack needed)
setw -g mode-keys vi                  # vi keys in copy mode

set -g base-index 1                   # windows start at 1
setw -g pane-base-index 1             # panes start at 1
set -g renumber-windows on            # keep window numbers gapless
setw -g monitor-activity on
set -g visual-activity off

# --- Key bindings ------------------------------------------------------------
# Prefix -> C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits keep the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane selection (prefix h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize (repeatable: hold the key after prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy-mode: vim-like selection, copy to system clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Status line (tokyonight-night, matches nvim) ----------------------------
set -g status on
set -g status-interval 15
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 120

# Left: session name (turns red while prefix is held) + zoom indicator
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #{?client_prefix,#[fg=#f7768e],#[fg=#7aa2f7]}#[bg=#1a1b26]#{?window_zoomed_flag, 🔍 , }#[default]"

# Right: date, time
set -g status-right "#[fg=#7aa2f7]%b %d  #[fg=#7dcfff]%H:%M "

set -g window-status-format         "#[fg=#565f89] #I #W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W "
set -g window-status-separator ""

# Draw the whole divider one colour. Default 'colour' highlights only HALF the
# border in 2-pane windows to mark the active pane — with a near-invisible
# inactive colour that reads as a divider that stops halfway / jumps on focus.
set -g pane-border-indicators off
set -g pane-border-style        "fg=#3b4261"   # visible against the dark bg
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#7aa2f7,fg=#1a1b26"

# --- Plugins (tpm) -----------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # sane universal defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'  # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto-save + restore on start

# resurrect/continuum: persist across reboots, keep pane contents + nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Auto-install tpm + plugins on first launch.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
